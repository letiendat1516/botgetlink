<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hương thích xem phim</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;overflow-x:hidden}

    body{
      background-image:url('assets/bg.png');
      background-size:cover;
      background-position:center top;
      background-repeat:repeat-y;
      background-color:#fce8ed;
    }

    .page{
      position:relative;
      max-width:430px;
      margin:0 auto;
      padding:0 0 40px;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── LOGO ── */
    .logo-wrap{
      width:86%;
      margin:0 auto;
      padding-top:28px;
    }
    .logo-wrap img{
      width:100%;
      height:auto;
      display:block;
      mix-blend-mode:multiply;
    }

    /* ── INPUT BOX ── */
    .inputbox-wrap{
      position:relative;
      width:94%;
      margin:10px auto 0;
    }
    .inputbox-wrap img.inputbox-asset{
      width:100%;
      height:auto;
      display:block;
      mix-blend-mode:multiply;
    }

    /*
      Textarea overlay – nằm bên trong khung trắng của input-box.png
      Dựa theo mockup:
        - khung trắng bắt đầu ~left 14%, right 14%, top 9%, bottom 68%
    */
    .cookie-area{
      position:absolute;
      top:9%;
      left:14%;
      width:72%;
      height:57%;
      background:transparent;
      border:none;
      outline:none;
      resize:none;
      font-family:'Baloo 2','Arial Black',sans-serif;
      font-size:clamp(.72rem,3vw,.88rem);
      font-weight:700;
      color:#1a1a1a;
      line-height:1.65;
      z-index:10;
      padding:6px 4px;
    }
    .cookie-area::placeholder{
      color:#2a2a2a;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.03em;
      font-size:clamp(.68rem,2.8vw,.82rem);
    }

    /*
      Button overlay – đè lên nút hồng bên dưới khung
      Nút hồng trong mockup: ~top 72%, bottom 87%, căn giữa, ~56% rộng
    */
    .btn-overlay{
      position:absolute;
      top:72%;
      left:50%;
      transform:translateX(-50%);
      width:56%;
      height:14%;
      background:transparent;
      border:none;
      cursor:pointer;
      z-index:20;
      border-radius:60px;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-overlay:disabled{cursor:not-allowed;opacity:.3}

    /* ── RESULT ── */
    #gl-result{
      width:90%;
      margin:10px auto 0;
    }
    .result-wrap{animation:fadeUp .3s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .r-success{background:rgba(255,255,255,.85);border:2px solid #4ade80;border-radius:16px;padding:13px}
    .r-error  {background:rgba(255,255,255,.85);border:2px solid #e91e8c;border-radius:16px;padding:13px}
    .status-row{display:flex;align-items:center;gap:7px;font-weight:700;margin-bottom:8px;font-size:.8rem;font-family:'Baloo 2',sans-serif}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot-g{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);animation:dotPulse 1.8s ease-in-out infinite}
    .dot-r{background:#e91e8c;box-shadow:0 0 8px rgba(233,30,140,.5)}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}
    .link-row{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.9);border:1.5px solid #4ade80;border-radius:11px;padding:8px 10px;margin-bottom:9px}
    .link-val{font-family:'Courier New',monospace;font-size:.62rem;color:#166534;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp-btn{flex-shrink:0;padding:4px 10px;border-radius:7px;border:none;cursor:pointer;background:#dcfce7;color:#166534;font-family:sans-serif;font-size:.7rem;font-weight:700;transition:background .2s}
    .cp-btn:hover{background:#bbf7d0}
    .cp-btn.ok{background:#86efac}
    .open-link{display:flex;align-items:center;justify-content:center;width:100%;padding:11px;border-radius:11px;border:1.5px solid #4ade80;background:rgba(220,252,231,.8);color:#166534;font-family:'Baloo 2',sans-serif;font-size:.84rem;font-weight:700;text-decoration:none;transition:all .2s}
    .open-link:hover{background:rgba(187,247,208,.95);transform:translateY(-1px)}

    /* ── BOTTOM ROW: info + hamster cùng 1 hàng ── */
    .bottom-row{
      display:flex;
      align-items:flex-end;
      width:96%;
      margin:16px auto 0;
      gap:0;
    }
    .info-wrap{
      flex:0 0 44%;
      max-width:44%;
    }
    .info-wrap img{
      width:100%;
      height:auto;
      display:block;
      mix-blend-mode:multiply;
    }
    .hamster-wrap{
      flex:0 0 56%;
      max-width:56%;
      animation:hamFloat 2.5s ease-in-out infinite alternate;
    }
    .hamster-wrap canvas{
      width:100%;
      height:auto;
      display:block;
    }
    @keyframes hamFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}

    /* ── FOOTER BANNER ── */
    .footer-banner{
      width:92%;
      margin:14px auto 0;
      background:rgba(255,255,255,.65);
      border:2.5px solid #e91e8c;
      border-radius:50px;
      padding:13px 20px;
      text-align:center;
      font-family:'Baloo 2','Arial Black',sans-serif;
      font-size:clamp(.7rem,3vw,.84rem);
      font-weight:800;
      color:#1a1a1a;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .spinner{width:14px;height:14px;border:2.5px solid rgba(0,0,0,.15);border-top-color:#1a1a1a;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(min-width:431px){
      .page{border-left:1px solid #f5c6d0;border-right:1px solid #f5c6d0}
    }
  </style>
</head>
<body>
<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="assets/logo.png" alt="Netflix – Hương thích xem phim"/>
  </div>

  <!-- INPUT BOX: asset PNG + overlay textarea + invisible clickable button -->
  <div class="inputbox-wrap">
    <img class="inputbox-asset" src="assets/input-box.png" alt=""/>
    <textarea
      class="cookie-area"
      id="gl-cookie"
      placeholder=""
    ></textarea>
    <button
      class="btn-overlay"
      id="gl-btn"
      onclick="getLink()"
      aria-label="Lấy link đăng nhập"
    ></button>
  </div>

  <!-- RESULT -->
  <div id="gl-result"></div>

  <!-- BOTTOM: info trái + hamster phải, cùng hàng -->
  <div class="bottom-row">
    <div class="info-wrap">
      <img src="assets/info.png" alt="24/7 uy tín chất lượng an toàn"/>
    </div>
    <div class="hamster-wrap">
      <canvas id="hamster-canvas"></canvas>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer-banner">SHOP THÂN THIỆN VÀ IU THIÊN NHIÊN</div>

</div>
<script>
const API_URL = 'https://nftoken.site/v1/api.php';
const API_KEY = 'NFK_51d19f9116b5b7b08b17d5dd';

async function callApi(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
    body: JSON.stringify(payload),
  });
  const text = await r.text();
  try { return JSON.parse(text.replace(/^\uFEFF/, '').trim()); }
  catch { throw new Error('Response không phải JSON: ' + text.substring(0, 120)); }
}

async function getLink() {
  const cookie = document.getElementById('gl-cookie').value.trim();
  const btn    = document.getElementById('gl-btn');
  const resEl  = document.getElementById('gl-result');
  if (!cookie) { showError(resEl, 'Vui lòng nhập cookie trước!'); return; }
  btn.disabled = true;
  resEl.innerHTML = '';
  try {
    const data = await callApi({ cookie });
    if (data && (data.status === 'SUCCESS' || data.status === 'success')) {
      renderSuccess(resEl, findNftokenLink(data), data);
    } else {
      showError(resEl, data.message || 'Cookie DIE / không hợp lệ');
    }
  } catch (e) {
    showError(resEl, e.message);
  } finally {
    btn.disabled = false;
  }
}

function findNftokenLink(data) {
  if (data.nftoken) return `https://netflix.com/?nftoken=${data.nftoken}`;
  if (data.token)   return `https://netflix.com/?nftoken=${data.token}`;
  for (const v of Object.values(data)) {
    if (typeof v === 'string') {
      const m = v.match(/https?:\/\/netflix\.com\/\?nftoken=[^\s"]+/);
      if (m) return m[0];
    }
  }
  return null;
}

function renderSuccess(el, link, data) {
  const meta = [data.email||data.mail, data.plan, data.country].filter(Boolean).join(' · ');
  el.className = 'result-wrap';
  el.innerHTML = `
    <div class="r-success">
      <div class="status-row"><span class="dot dot-g"></span><span style="color:#166534">LIVE — Cookie hợp lệ!</span></div>
      ${meta ? `<p style="font-size:.7rem;color:#6b7280;margin-bottom:8px;font-family:'Baloo 2',sans-serif">${meta}</p>` : ''}
      ${link ? `
        <div class="link-row">
          <span class="link-val" title="${link}">${link}</span>
          <button class="cp-btn" id="cpbtn" onclick="doCopy('${link.replace(/'/g,"\\'")}','cpbtn')">Copy</button>
        </div>
        <a href="${link}" target="_blank" class="open-link">Mở Link Đăng Nhập Netflix</a>
      ` : `<p style="font-size:.73rem;color:#b45309;font-family:'Baloo 2',sans-serif">Không tìm thấy nftoken link.</p>`}
    </div>`;
}

function showError(el, msg) {
  el.className = 'result-wrap';
  el.innerHTML = `<div class="r-error"><div class="status-row"><span class="dot dot-r"></span><span style="color:#be185d;font-size:.8rem;font-family:'Baloo 2',sans-serif">${msg}</span></div></div>`;
}

async function doCopy(text, id) {
  const btn = document.getElementById(id);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
  } catch { prompt('Copy:', text); }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') getLink();
});

// ── Remove white background from hamster.png via Canvas ──
(function removeHamsterBg() {
  const canvas = document.getElementById('hamster-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = 'assets/hamster.png';
  img.onload = function() {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imageData.data;
    const threshold = 230; // pixels gần trắng sẽ bị transparent
    const tolerance = 30;  // fuzz edge mềm
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      // pixel gần trắng hoặc gần màu nền hồng pastel
      const isWhiteish = r > threshold && g > threshold && b > threshold;
      const isPinkBg   = r > 220 && g > 180 && b > 185 && r > g && r > b;
      if (isWhiteish || isPinkBg) {
        // mức độ transparent tăng dần theo độ gần trắng (anti-alias mềm)
        const brightness = (r + g + b) / 3;
        const alpha = Math.max(0, 255 - brightness) * (255 / (255 - threshold));
        d[i+3] = Math.min(d[i+3], Math.round(alpha));
      }
    }
    ctx.putImageData(imageData, 0, 0);
  };
})();
</script>
</body>
</html>
