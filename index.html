<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hương thích xem phim</title>
  <meta name="description" content="Get link đăng nhập Netflix tức thì – Hương thích xem phim"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
    body{font-family:'Inter',system-ui,sans-serif;background:#050810;color:#f1f5f9;overflow-x:hidden;min-height:100vh}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#0d1117}
    ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#dc2626,#b91c1c);border-radius:3px}
    ::selection{background:rgba(220,38,38,.35);color:#fff}

    .bg-animated{
      position:fixed;inset:0;z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%,rgba(220,38,38,.18) 0%,transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%,rgba(185,28,28,.14) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 50%,rgba(239,68,68,.06) 0%,transparent 70%),
        #080505;
      animation:bgPulse 12s ease-in-out infinite alternate;
    }
    @keyframes bgPulse{
      0%{background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(220,38,38,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(185,28,28,.14) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 60% 50%,rgba(239,68,68,.06) 0%,transparent 70%),#080505}
      100%{background:radial-gradient(ellipse 80% 60% at 30% 110%,rgba(220,38,38,.16) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 70% -10%,rgba(185,28,28,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 40% 50%,rgba(239,68,68,.08) 0%,transparent 70%),#080505}
    }
    .bg-animated::after{
      content:'';position:absolute;inset:0;
      background-image:linear-gradient(rgba(220,38,38,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(220,38,38,.04) 1px,transparent 1px);
      background-size:56px 56px;
    }

    nav{
      position:fixed;top:0;inset-x:0;z-index:50;
      background:rgba(8,5,5,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.06);
      height:56px;display:flex;align-items:center;justify-content:center;padding:0 20px;
    }
    .nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none}
    .nav-icon{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#dc2626,#b91c1c);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(220,38,38,.5)}
    .nav-name{font-size:.88rem;font-weight:800;background:linear-gradient(135deg,#fca5a5,#f87171,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    .wrapper{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:clamp(76px,11vw,110px) clamp(14px,5vw,32px) 60px}
    .container{width:100%;max-width:620px}

    .hero{text-align:center;margin-bottom:36px}
    .hero-icon{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#dc2626,#b91c1c);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 28px rgba(220,38,38,.55),0 0 60px rgba(220,38,38,.2);animation:glowPulse 3s ease-in-out infinite alternate}
    @keyframes glowPulse{from{box-shadow:0 0 20px rgba(220,38,38,.45),0 0 40px rgba(220,38,38,.15)}to{box-shadow:0 0 40px rgba(220,38,38,.75),0 0 80px rgba(220,38,38,.3)}}
    .hero-title{font-size:clamp(1.5rem,5vw,2.1rem);font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,#fef2f2 20%,#fca5a5 60%,#f87171 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .hero-sub{font-size:.78rem;color:rgba(100,116,139,.7);letter-spacing:.06em;text-transform:uppercase}

    .panel{display:none;animation:fadeUp .4s cubic-bezier(.16,1,.3,1) forwards}
    .panel.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .card{background:rgba(18,8,8,.8);backdrop-filter:blur(28px) saturate(150%);-webkit-backdrop-filter:blur(28px) saturate(150%);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:clamp(18px,5vw,30px);transition:border-color .3s,box-shadow .3s}
    .card:hover{border-color:rgba(220,38,38,.3);box-shadow:0 0 50px rgba(220,38,38,.08)}

    label{display:block;font-size:.7rem;font-weight:700;color:rgba(148,163,184,.6);letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px}
    textarea,input[type=text]{
      width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
      border-radius:13px;padding:12px 14px;color:#f1f5f9;font-family:'Courier New',monospace;
      font-size:.76rem;line-height:1.65;resize:none;outline:none;
      transition:border-color .25s,box-shadow .25s,background .25s;
    }
    textarea::placeholder,input::placeholder{color:rgba(100,116,139,.5)}
    textarea:focus,input:focus{
      border-color:rgba(220,38,38,.6);background:rgba(220,38,38,.05);
      box-shadow:0 0 0 3px rgba(220,38,38,.12),0 0 20px rgba(220,38,38,.08);
    }
    .field{margin-bottom:14px}

    .btn{
      width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;
      font-family:inherit;font-size:.88rem;font-weight:700;letter-spacing:.02em;
      background:linear-gradient(135deg,#dc2626,#b91c1c 50%,#991b1b);
      background-size:200%;color:#fff;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s,opacity .2s;
      box-shadow:0 6px 28px rgba(220,38,38,.4);
      position:relative;overflow:hidden;
      animation:btnGrad 5s ease infinite;
    }
    @keyframes btnGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent);opacity:0;transition:opacity .25s}
    .btn:hover::before{opacity:1}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(220,38,38,.55)}
    .btn:active{transform:translateY(0) scale(.98)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important}

    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    .result-wrap{margin-top:14px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1)}
    .r-success{background:linear-gradient(135deg,rgba(16,185,129,.09),rgba(6,182,212,.05));border:1px solid rgba(16,185,129,.3);border-radius:16px;padding:18px}
    .r-error{background:linear-gradient(135deg,rgba(239,68,68,.09),rgba(220,38,38,.05));border:1px solid rgba(239,68,68,.3);border-radius:16px;padding:18px}

    .status-row{display:flex;align-items:center;gap:7px;font-size:.8rem;font-weight:700;margin-bottom:12px}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:dotPulse 1.8s ease-in-out infinite}
    .dot-g{background:#34d399;box-shadow:0 0 8px rgba(52,211,153,.7)}
    .dot-r{background:#f87171;box-shadow:0 0 8px rgba(248,113,113,.6);animation:none}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.5}}

    .link-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(16,185,129,.2);border-radius:11px;padding:9px 12px;margin-bottom:10px}
    .link-val{font-family:'Courier New',monospace;font-size:.71rem;color:#34d399;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp-btn{flex-shrink:0;padding:5px 11px;border-radius:7px;border:none;cursor:pointer;background:rgba(52,211,153,.15);color:#34d399;font-family:inherit;font-size:.71rem;font-weight:700;transition:background .2s}
    .cp-btn:hover{background:rgba(52,211,153,.28)}
    .cp-btn.ok{background:rgba(52,211,153,.3);color:#6ee7b7}

    .open-link{
      display:flex;align-items:center;justify-content:center;gap:7px;
      width:100%;padding:11px;border-radius:11px;border:none;cursor:pointer;
      background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(6,182,212,.12));
      border:1px solid rgba(16,185,129,.3);
      color:#34d399;font-family:inherit;font-size:.82rem;font-weight:700;
      text-decoration:none;transition:all .25s;
    }
    .open-link:hover{background:linear-gradient(135deg,rgba(16,185,129,.3),rgba(6,182,212,.22));transform:translateY(-1px)}

    @media(max-width:380px){.tv-code-input{font-size:1.1rem !important;letter-spacing:.14em !important}}
  </style>
</head>
<body>
<div class="bg-animated"></div>

<nav>
  <a href="#" class="nav-brand">
    <div class="nav-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </div>
    <span class="nav-name">Hương thích xem phim</span>
  </a>
</nav>

<div class="wrapper">
  <div class="container">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <div class="hero-title">Hương thích xem phim 🎬</div>
      <div class="hero-sub">Netflix Tool · 2026</div>
    </div>

    <!-- TABS -->
    <!-- Tabs đã bị gỡ — chỉ còn 1 chức năng Get Link Login -->

    <!-- ═══ PANEL: GET LINK ═══ -->
    <div id="panel-gl" class="panel active">
      <div class="card">
        <div class="field">
          <label>Netflix Cookie</label>
          <textarea id="gl-cookie" rows="6" placeholder="Dán cookie Netflix vào đây...&#10;&#10;Ví dụ:&#10;NetflixId=v%3D3...; SecureNetflixId=v%3D3...; nfvdid=..."></textarea>
        </div>
        <button class="btn" id="gl-btn" onclick="getLink()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Lấy Link Đăng Nhập
        </button>
        <div id="gl-result"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── TABS (đã gỡ — chỉ còn 1 chức năng) ──

// ── NFTOKEN V1 API (direct, CORS-enabled) ──
const API_URL = 'https://nftoken.site/v1/api.php';
const API_KEY = 'NFK_51d19f9116b5b7b08b17d5dd';

async function callApi(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': API_KEY,
    },
    body: JSON.stringify(payload),
  });
  const text = await r.text();
  try { return JSON.parse(text.replace(/^\uFEFF/, '').trim()); }
  catch { throw new Error('Response không phải JSON: ' + text.substring(0, 120)); }
}

// ── GET LINK LOGIN ──
async function getLink() {
  const cookie = document.getElementById('gl-cookie').value.trim();
  const btn    = document.getElementById('gl-btn');
  const resEl  = document.getElementById('gl-result');

  if (!cookie) { showError(resEl, '⚠️ Vui lòng nhập cookie trước!'); return; }

  setLoad(btn, true, 'Đang xử lý...');
  resEl.innerHTML = '';

  try {
    const data = await callApi({ cookie });
    if (data && (data.status === 'SUCCESS' || data.status === 'success')) {
      const link = findNftokenLink(data);
      renderSuccess(resEl, link, data);
    } else {
      showError(resEl, '❌ ' + (data.message || 'Cookie DIE / không hợp lệ'));
    }
  } catch (e) {
    showError(resEl, '🚫 ' + e.message);
  } finally {
    setLoad(btn, false, iconLink() + ' Lấy Link Đăng Nhập');
  }
}

function findNftokenLink(data) {
  if (data.nftoken) return `https://netflix.com/?nftoken=${data.nftoken}`;
  if (data.token)   return `https://netflix.com/?nftoken=${data.token}`;
  for (const v of Object.values(data)) {
    if (typeof v === 'string') {
      const m = v.match(/https?:\/\/netflix\.com\/\?nftoken=[^\s"]+/);
      if (m) return m[0];
    }
  }
  return null;
}

function renderSuccess(el, link, data) {
  const meta = [data.email||data.mail, data.plan, data.country].filter(Boolean).join(' · ');
  el.className = 'result-wrap';
  el.innerHTML = `
    <div class="r-success">
      <div class="status-row"><span class="dot dot-g"></span><span style="color:#34d399">LIVE — Cookie hợp lệ!</span></div>
      ${meta ? `<p style="font-size:.73rem;color:rgba(148,163,184,.6);margin-bottom:12px">${meta}</p>` : ''}
      ${link ? `
        <div class="link-row">
          <span class="link-val" title="${link}">${link}</span>
          <button class="cp-btn" id="cpbtn" onclick="doCopy('${link.replace(/'/g,"\\'")}','cpbtn')">Copy</button>
        </div>
        <a href="${link}" target="_blank" class="open-link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Mở Link Đăng Nhập Netflix
        </a>
      ` : `<p style="font-size:.76rem;color:#fbbf24">⚠️ Không tìm thấy nftoken link trong response.</p>`}
    </div>`;
}

// ── TV CODE FLOW (đã gỡ bỏ) ──

// ── HELPERS ──
function showError(el, msg) {
  el.className = 'result-wrap';
  el.innerHTML = `<div class="r-error"><div class="status-row"><span class="dot dot-r"></span><span style="color:#f87171;font-size:.8rem;font-weight:700">${msg}</span></div></div>`;
}

function setLoad(btn, on, html) {
  btn.disabled = on;
  btn.innerHTML = on ? `<div class="spinner"></div> ${html}` : html;
}

async function doCopy(text, id) {
  const btn = document.getElementById(id);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
  } catch { prompt('Copy:', text); }
}

function iconLink() {
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
}

// Ctrl+Enter submit
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') getLink();
});
</script>
</body>
</html>
