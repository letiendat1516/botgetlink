<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hương thích xem phim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@400;600;700&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;overflow-x:hidden}

    body{
      font-family:'Fredoka',sans-serif;
      /* pink checker background using CSS, replace with your bg image if you have one */
      background-color:#fce8ed;
      background-image:repeating-conic-gradient(#f5c6d0 0% 25%, #fce8ed 0% 50%);
      background-size:60px 60px;
      color:#1a1a1a;
    }

    /* ── WRAPPER ── */
    .page{
      position:relative;
      max-width:430px;
      margin:0 auto;
      padding:32px 20px 80px;
      min-height:100vh;
    }

    /* ── HEADER ── */
    .header{
      position:relative;
      text-align:center;
      margin-bottom:28px;
      padding:0 50px;
    }
    .logo-netflix{
      font-family:'Pacifico',cursive;
      font-size:clamp(2.6rem,11vw,3.4rem);
      color:#e91e8c;
      text-shadow:3px 3px 0 #b00060, 5px 5px 8px rgba(185,0,80,.3);
      line-height:1.1;
      margin-bottom:2px;
    }
    .logo-sub{
      font-family:'Pacifico',cursive;
      font-size:clamp(1.25rem,5.5vw,1.75rem);
      color:#e91e8c;
      text-shadow:2px 2px 0 #b00060;
      line-height:1.3;
    }
    /* butterfly: top-left */
    .asset-butterfly{
      position:absolute;
      top:-8px;left:-10px;
      width:72px;height:auto;
      transform:rotate(-10deg);
      filter:drop-shadow(1px 2px 5px rgba(0,0,0,.15));
      animation:flutter 3s ease-in-out infinite alternate;
    }
    /* popcorn: top-right */
    .asset-popcorn-top{
      position:absolute;
      top:-14px;right:-10px;
      width:66px;height:auto;
      filter:drop-shadow(1px 2px 5px rgba(0,0,0,.15));
      animation:wobble 4s ease-in-out infinite;
    }
    @keyframes flutter{from{transform:rotate(-12deg) scale(1)}to{transform:rotate(8deg) scale(1.08)}}
    @keyframes wobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

    /* ── INPUT CARD ── */
    .input-wrap{
      position:relative;
      margin-bottom:20px;
    }
    .cookie-card{
      background:rgba(255,255,255,.60);
      border:2.5px solid #e91e8c;
      border-radius:24px;
      padding:18px 16px;
      box-shadow:0 4px 18px rgba(233,30,140,.13);
      position:relative;
    }
    .cookie-area{
      width:100%;
      min-height:170px;
      background:transparent;
      border:none;
      outline:none;
      font-family:'Baloo 2',sans-serif;
      font-size:.88rem;
      font-weight:600;
      color:#5a1020;
      resize:none;
      line-height:1.7;
    }
    .cookie-area::placeholder{
      color:#cc8899;
      text-transform:uppercase;
      letter-spacing:.04em;
      font-size:.82rem;
      font-weight:700;
    }
    /* sparkle: top-right corner of card */
    .asset-sparkle{
      position:absolute;
      top:-20px;right:-18px;
      width:46px;height:auto;
      animation:spinSlow 4s linear infinite;
      filter:drop-shadow(0 0 4px rgba(233,30,140,.4));
    }
    @keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* butterfly small left of card */
    .asset-butterfly-sm{
      position:absolute;
      left:-28px;top:50%;
      transform:translateY(-50%);
      width:48px;height:auto;
      filter:drop-shadow(1px 2px 4px rgba(0,0,0,.12));
    }

    /* ── BUTTON ── */
    .btn-wrap{display:flex;justify-content:center;margin-bottom:28px}
    .btn-main{
      padding:15px 44px;
      background:#e91e8c;
      color:#fff;
      font-family:'Baloo 2',sans-serif;
      font-size:1rem;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
      border:none;
      border-radius:60px;
      cursor:pointer;
      box-shadow:0 5px 18px rgba(233,30,140,.38);
      transition:transform .18s,box-shadow .18s;
      display:flex;align-items:center;gap:8px;
    }
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 9px 26px rgba(233,30,140,.48)}
    .btn-main:active{transform:scale(.96)}
    .btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none !important}

    /* ── RESULT ── */
    #gl-result{margin-bottom:16px}
    .result-wrap{animation:fadeUp .3s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .r-success{background:rgba(255,255,255,.72);border:2px solid #4ade80;border-radius:18px;padding:16px}
    .r-error{background:rgba(255,255,255,.72);border:2px solid #e91e8c;border-radius:18px;padding:16px}
    .status-row{display:flex;align-items:center;gap:7px;font-weight:700;margin-bottom:8px;font-size:.83rem}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot-g{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);animation:dotPulse 1.8s ease-in-out infinite}
    .dot-r{background:#e91e8c;box-shadow:0 0 8px rgba(233,30,140,.5)}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}
    .link-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.85);border:1.5px solid #4ade80;border-radius:12px;padding:9px 12px;margin-bottom:10px}
    .link-val{font-family:'Courier New',monospace;font-size:.65rem;color:#166534;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp-btn{flex-shrink:0;padding:5px 11px;border-radius:8px;border:none;cursor:pointer;background:#dcfce7;color:#166534;font-family:'Fredoka',sans-serif;font-size:.74rem;font-weight:600;transition:background .2s}
    .cp-btn:hover{background:#bbf7d0}
    .cp-btn.ok{background:#86efac}
    .open-link{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;border-radius:12px;border:1.5px solid #4ade80;background:rgba(220,252,231,.75);color:#166534;font-family:'Fredoka',sans-serif;font-size:.86rem;font-weight:700;text-decoration:none;transition:all .2s}
    .open-link:hover{background:rgba(187,247,208,.9);transform:translateY(-1px)}

    /* ── BOTTOM SECTION ── */
    .bottom-section{
      position:relative;
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,.48);
      border:2px solid #e91e8c;
      border-radius:20px;
      padding:16px 16px;
      margin-bottom:20px;
      min-height:110px;
      overflow:visible;
    }
    .stat-block{flex-shrink:0;text-align:center;min-width:72px}
    .stat-247{
      font-family:'Pacifico',cursive;
      font-size:2.2rem;
      color:#e91e8c;
      text-shadow:2px 2px 0 #b00060;
      line-height:1;
      margin-bottom:4px;
    }
    .stat-desc{
      font-family:'Baloo 2',sans-serif;
      font-size:.68rem;
      font-weight:800;
      color:#b00060;
      text-transform:uppercase;
      letter-spacing:.03em;
      line-height:1.4;
    }
    .divider-v{width:2px;height:56px;background:#f5b4be;border-radius:2px;flex-shrink:0}

    /* mascots right side */
    .mascot-zone{flex:1;position:relative;height:100px;min-width:160px}
    /* hamster big center-right */
    .asset-hamster{
      position:absolute;
      bottom:-10px;right:0;
      width:110px;height:auto;
      filter:drop-shadow(2px 4px 8px rgba(0,0,0,.18));
      animation:hamFloat 2.5s ease-in-out infinite alternate;
    }
    @keyframes hamFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
    /* popcorn small near hamster */
    .asset-popcorn-sm{
      position:absolute;
      bottom:0;right:106px;
      width:52px;height:auto;
      filter:drop-shadow(1px 2px 4px rgba(0,0,0,.13));
    }
    /* movie icon right edge */
    .asset-movie{
      position:absolute;
      top:4px;right:-18px;
      width:54px;height:auto;
      transform:rotate(6deg);
      filter:drop-shadow(1px 2px 4px rgba(0,0,0,.14));
    }
    /* sparkle over bottom section */
    .asset-sparkle-sm{
      position:absolute;
      top:-16px;right:60px;
      width:32px;height:auto;
    }

    /* ── FOOTER BANNER ── */
    .footer-banner{
      background:rgba(255,255,255,.55);
      border:2.5px solid #e91e8c;
      border-radius:50px;
      padding:13px 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:10px;
    }
    .footer-text{
      font-family:'Baloo 2',sans-serif;
      font-size:.82rem;
      font-weight:800;
      color:#1a1a1a;
      text-transform:uppercase;
      letter-spacing:.05em;
    }
    /* girl sticker in footer */
    .asset-girl{
      width:44px;height:auto;
      filter:drop-shadow(1px 2px 4px rgba(0,0,0,.13));
    }

    /* spinner */
    .spinner{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:360px){
      .page{padding:24px 14px 60px}
      .asset-hamster{width:90px}
      .btn-main{padding:13px 32px;font-size:.9rem}
    }
    @media(min-width:500px){
      .page{padding:40px 28px 80px}
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <img class="asset-butterfly" src="247/1.png" alt="butterfly"/>
    <div class="logo-netflix">Netflix</div>
    <div class="logo-sub">Hương thích xem phim</div>
    <img class="asset-popcorn-top" src="247/2.png" alt="popcorn"/>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="cookie-card">
      <img class="asset-sparkle" src="247/4.png" alt="sparkle"/>
      <textarea class="cookie-area" id="gl-cookie" rows="7" placeholder="NHẬP LINK COOKIE....."></textarea>
    </div>
  </div>

  <!-- BUTTON -->
  <div class="btn-wrap">
    <button class="btn-main" id="gl-btn" onclick="getLink()">LẤY LINK ĐĂNG NHẬP</button>
  </div>

  <!-- RESULT -->
  <div id="gl-result"></div>

  <!-- BOTTOM SECTION: 24/7 + mascots -->
  <div class="bottom-section">
    <div class="stat-block">
      <div class="stat-247">24/7</div>
      <div class="stat-desc">UY TÍN - CHẤT LƯỢNG<br>AN TOÀN</div>
    </div>
    <div class="divider-v"></div>
    <div class="mascot-zone">
      <img class="asset-popcorn-sm" src="247/2.png" alt="popcorn"/>
      <img class="asset-hamster"    src="247/3.png" alt="hamster"/>
      <img class="asset-movie"      src="247/5.png" alt="movie"/>
    </div>
    <img class="asset-sparkle-sm" src="247/4.png" alt="sparkle"/>
  </div>

  <!-- FOOTER BANNER -->
  <div class="footer-banner">
    <img class="asset-girl" src="247/1.png" alt=""/>
    <div class="footer-text">SHOP THÂN THIỆN VÀ IU THIÊN NHIÊN</div>
  </div>

</div>

<script>
const API_URL = 'https://nftoken.site/v1/api.php';
const API_KEY = 'NFK_51d19f9116b5b7b08b17d5dd';

async function callApi(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
    body: JSON.stringify(payload),
  });
  const text = await r.text();
  try { return JSON.parse(text.replace(/^\uFEFF/, '').trim()); }
  catch { throw new Error('Response không phải JSON: ' + text.substring(0, 120)); }
}

async function getLink() {
  const cookie = document.getElementById('gl-cookie').value.trim();
  const btn    = document.getElementById('gl-btn');
  const resEl  = document.getElementById('gl-result');
  if (!cookie) { showError(resEl, '⚠️ Vui lòng nhập cookie trước!'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Đang xử lý...';
  resEl.innerHTML = '';
  try {
    const data = await callApi({ cookie });
    if (data && (data.status === 'SUCCESS' || data.status === 'success')) {
      const link = findNftokenLink(data);
      renderSuccess(resEl, link, data);
    } else {
      showError(resEl, '❌ ' + (data.message || 'Cookie DIE / không hợp lệ'));
    }
  } catch (e) {
    showError(resEl, '🚫 ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'LẤY LINK ĐĂNG NHẬP';
  }
}

function findNftokenLink(data) {
  if (data.nftoken) return `https://netflix.com/?nftoken=${data.nftoken}`;
  if (data.token)   return `https://netflix.com/?nftoken=${data.token}`;
  for (const v of Object.values(data)) {
    if (typeof v === 'string') {
      const m = v.match(/https?:\/\/netflix\.com\/\?nftoken=[^\s"]+/);
      if (m) return m[0];
    }
  }
  return null;
}

function renderSuccess(el, link, data) {
  const meta = [data.email||data.mail, data.plan, data.country].filter(Boolean).join(' · ');
  el.className = 'result-wrap';
  el.innerHTML = `
    <div class="r-success">
      <div class="status-row"><span class="dot dot-g"></span><span style="color:#166534">LIVE — Cookie hợp lệ! 🎉</span></div>
      ${meta ? `<p style="font-size:.72rem;color:#6b7280;margin-bottom:10px">${meta}</p>` : ''}
      ${link ? `
        <div class="link-row">
          <span class="link-val" title="${link}">${link}</span>
          <button class="cp-btn" id="cpbtn" onclick="doCopy('${link.replace(/'/g,"\\'")}','cpbtn')">Copy</button>
        </div>
        <a href="${link}" target="_blank" class="open-link">🎬 Mở Link Đăng Nhập Netflix</a>
      ` : `<p style="font-size:.75rem;color:#b45309">⚠️ Không tìm thấy nftoken link.</p>`}
    </div>`;
}

function showError(el, msg) {
  el.className = 'result-wrap';
  el.innerHTML = `<div class="r-error"><div class="status-row"><span class="dot dot-r"></span><span style="color:#be185d;font-size:.82rem;font-weight:700">${msg}</span></div></div>`;
}

async function doCopy(text, id) {
  const btn = document.getElementById(id);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
  } catch { prompt('Copy:', text); }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') getLink();
});
</script>
</body>
</html>
