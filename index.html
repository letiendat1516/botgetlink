<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hương thích xem phim</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;overflow-x:hidden}

    body{
      background-color:#fce8ed;
      background-image:url('assets/bg.png');
      background-size:cover;
      background-position:center top;
      background-repeat:repeat-y;
    }

    .page{
      position:relative;
      max-width:430px;
      margin:0 auto;
      padding:0 0 40px;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── ABOVE FOLD ── */
    .above-fold{min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;padding-bottom:16px}

    /* ── LOGO ── */
    .logo-wrap{
      width:86%;
      margin:0 auto;
      padding-top:28px;
    }
    .logo-wrap img{
      width:100%;
      height:auto;
      display:block;
      mix-blend-mode:multiply;
    }

    /* ── INPUT BOX ── */
    .inputbox-wrap{
      position:relative;
      width:94%;
      margin:-40px auto 0;
    }
    .inputbox-wrap img.inputbox-asset{
      display:block;
      width:100%;
      height:auto;
      mix-blend-mode:multiply;
    }
    .textarea-wrap{
      position:absolute;
      top:33%;
      left:17%;
      width:68%;
      height:34%;
      z-index:5;
      padding:6px;
      box-sizing:border-box;
    }
    .cookie-area{
      width:100%;
      height:100%;
      background:transparent;
      border:none;
      outline:none;
      resize:none;
      font-family:'Baloo 2','Arial Black',sans-serif;
      font-size:14px;
      font-weight:700;
      color:#222;
      line-height:1.5;
      overflow-y:auto;
      overflow-x:hidden;
      word-break:break-word;
      overflow-wrap:break-word;
      box-sizing:border-box;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }
    .cookie-area::-webkit-scrollbar{display:none}
    .cookie-area::placeholder{color:#888;font-weight:600;font-size:13px}
    .btn-overlay{
      position:absolute;
      top:70%;
      left:50%;
      transform:translateX(-50%);
      width:52%;
      height:14%;
      background:transparent;
      border:none;
      cursor:pointer;
      z-index:20;
      border-radius:60px;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-overlay:disabled{cursor:not-allowed;opacity:.3}

    /* ── RESULT ── */
    #gl-result{width:90%;margin:10px auto 0}
    .result-wrap{animation:fadeUp .3s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .r-success{background:rgba(255,255,255,.85);border:2px solid #4ade80;border-radius:16px;padding:13px}
    .r-error  {background:rgba(255,255,255,.85);border:2px solid #e91e8c;border-radius:16px;padding:13px}
    .status-row{display:flex;align-items:center;gap:7px;font-weight:700;margin-bottom:8px;font-size:.8rem;font-family:'Baloo 2',sans-serif}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot-g{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);animation:dotPulse 1.8s ease-in-out infinite}
    .dot-r{background:#e91e8c;box-shadow:0 0 8px rgba(233,30,140,.5)}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}
    .link-row{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.9);border:1.5px solid #4ade80;border-radius:11px;padding:8px 10px;margin-bottom:9px}
    .link-val{font-family:'Courier New',monospace;font-size:.62rem;color:#166534;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp-btn{flex-shrink:0;padding:4px 10px;border-radius:7px;border:none;cursor:pointer;background:#dcfce7;color:#166534;font-family:sans-serif;font-size:.7rem;font-weight:700;transition:background .2s}
    .cp-btn:hover{background:#bbf7d0}
    .cp-btn.ok{background:#86efac}
    .open-link{display:flex;align-items:center;justify-content:center;width:100%;padding:11px;border-radius:11px;border:1.5px solid #4ade80;background:rgba(220,252,231,.8);color:#166534;font-family:'Baloo 2',sans-serif;font-size:.84rem;font-weight:700;text-decoration:none;transition:all .2s}
    .open-link:hover{background:rgba(187,247,208,.95);transform:translateY(-1px)}

    /* ── BOTTOM ROW: info + hamster cùng 1 hàng ── */
    .bottom-row{display:flex;align-items:flex-end;width:96%;margin:16px auto 0;gap:0}
    .info-wrap{flex:0 0 44%;max-width:44%}
    .info-wrap img{width:100%;max-width:180px;height:auto;display:block;mix-blend-mode:multiply}
    .hamster-wrap{flex:0 0 56%;max-width:56%;animation:hamFloat 2.5s ease-in-out infinite alternate}
    .hamster-wrap canvas{width:100%;height:auto;display:block}
    @keyframes hamFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}

    /* ── FOOTER ── */
    .footer-banner{
      width:92%;margin:14px auto 0;
      background:rgba(255,255,255,.65);
      border:2.5px solid #e91e8c;border-radius:50px;
      padding:13px 20px;text-align:center;
      font-family:'Baloo 2','Arial Black',sans-serif;
      font-size:clamp(.7rem,3vw,.84rem);font-weight:800;
      color:#1a1a1a;text-transform:uppercase;letter-spacing:.05em;
    }

    .spinner{width:14px;height:14px;border:2.5px solid rgba(0,0,0,.15);border-top-color:#1a1a1a;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── GUIDE SECTION ── */
    .guide-section{width:92%;margin:18px auto 0}
    .guide-title{font-family:'Baloo 2','Arial Black',sans-serif;font-size:.82rem;font-weight:800;color:#e91e8c;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;text-align:center}
    .slider-wrapper{width:100%;overflow:hidden;border-radius:16px;border:2px solid #f5b4be;background:rgba(255,255,255,.6)}
    .slider-track{display:flex;transition:transform .4s cubic-bezier(.4,0,.2,1)}
    .slide-item{min-width:100%;box-sizing:border-box}
    .slide-img{width:100%;height:auto;display:block;cursor:zoom-in;border-radius:14px;transition:transform .2s}
    .slide-img:hover{transform:scale(1.01)}
    .slider-dots{display:flex;justify-content:center;gap:7px;margin-top:9px}
    .dot-nav{width:8px;height:8px;border-radius:50%;background:#f5b4be;cursor:pointer;transition:background .2s,transform .2s}
    .dot-nav.active{background:#e91e8c;transform:scale(1.3)}
    .slider-arrows{display:flex;justify-content:center;gap:14px;margin-top:8px}
    .arrow-btn{background:rgba(255,255,255,.85);border:2px solid #e91e8c;color:#e91e8c;border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:700}
    .arrow-btn:hover{background:#e91e8c;color:#fff}

    /* ── ZOOM MODAL ── */
    .zoom-modal{display:none;position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,.82);backdrop-filter:blur(4px);align-items:center;justify-content:center}
    .zoom-modal.show{display:flex}
    .zoom-img{max-width:94vw;max-height:90vh;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.5);animation:zoomIn .25s ease}
    @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .zoom-close{position:absolute;top:18px;right:20px;width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;cursor:pointer;font-weight:700;transition:background .2s}
    .zoom-close:hover{background:rgba(255,255,255,.3)}

    /* ── LOADING OVERLAY ── */
    .loading-overlay{
      display:none;position:fixed;inset:0;z-index:999;
      background:rgba(252,232,237,.75);backdrop-filter:blur(3px);
      flex-direction:column;align-items:center;justify-content:center;gap:18px;
    }
    .loading-overlay.show{display:flex}
    .loading-box{
      background:rgba(255,255,255,.92);border:2.5px solid #e91e8c;border-radius:24px;
      padding:28px 36px;text-align:center;box-shadow:0 8px 32px rgba(233,30,140,.18);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .loading-hearts{font-size:2rem;letter-spacing:4px;animation:heartBeat 1s ease-in-out infinite}
    @keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .loading-bar-wrap{width:180px;height:8px;background:#fce8ed;border-radius:99px;overflow:hidden;margin:14px auto 0;border:1.5px solid #f5b4be}
    .loading-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff80bc,#e91e8c);border-radius:99px;animation:loadBar 2s ease-in-out infinite}
    @keyframes loadBar{0%{width:0%;margin-left:0}60%{width:80%;margin-left:0}100%{width:0%;margin-left:100%}}
    .loading-text{font-family:'Baloo 2',sans-serif;font-size:.88rem;font-weight:700;color:#e91e8c;margin-top:10px;animation:textFade 1.4s ease-in-out infinite alternate}
    @keyframes textFade{from{opacity:.5}to{opacity:1}}
  </style>
</head>
<body>
<div class="page">

  <!-- ABOVE FOLD -->
  <div class="above-fold">

    <!-- LOGO -->
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="Netflix – Hương thích xem phim"/>
    </div>

    <!-- INPUT BOX -->
    <div class="inputbox-wrap">
      <img class="inputbox-asset" src="assets/input-box.png" alt=""/>
      <div class="textarea-wrap">
        <textarea class="cookie-area" id="gl-cookie" placeholder="NHẬP LINK COOKIE....."></textarea>
      </div>
      <button class="btn-overlay" id="gl-btn" onclick="getLink()" aria-label="Lấy link đăng nhập"></button>
    </div>

    <!-- RESULT -->
    <div id="gl-result"></div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">
      <div class="info-wrap">
        <img src="assets/info.png" alt="24/7 uy tín chất lượng an toàn"/>
      </div>
      <div class="hamster-wrap">
        <canvas id="hamster-canvas"></canvas>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-banner">SHOP THÂN THIỆN VÀ IU THIÊN NHIÊN</div>

  </div><!-- /.above-fold -->

  <!-- HƯỚNG DẪN (scroll xuống mới thấy) -->
  <div class="guide-section">
    <div class="guide-title">📖 HƯỚNG DẪN SỬ DỤNG</div>
    <div class="slider-wrapper">
      <div class="slider-track" id="sliderTrack">
        <div class="slide-item"><img src="assets/2.png" alt="Hướng dẫn 1" class="slide-img" onclick="openZoom(this.src)"/></div>
        <div class="slide-item"><img src="assets/3.png" alt="Hướng dẫn 2" class="slide-img" onclick="openZoom(this.src)"/></div>
        <div class="slide-item"><img src="assets/4.png" alt="Hướng dẫn 3" class="slide-img" onclick="openZoom(this.src)"/></div>
      </div>
    </div>
    <div class="slider-dots">
      <span class="dot-nav active" onclick="goSlide(0)"></span>
      <span class="dot-nav" onclick="goSlide(1)"></span>
      <span class="dot-nav" onclick="goSlide(2)"></span>
    </div>
    <div class="slider-arrows">
      <button class="arrow-btn" onclick="prevSlide()">&#8592;</button>
      <button class="arrow-btn" onclick="nextSlide()">&#8594;</button>
    </div>
  </div>

  <!-- ZOOM MODAL -->
  <div class="zoom-modal" id="zoomModal" onclick="closeZoom()">
    <div class="zoom-close" onclick="closeZoom()">✕</div>
    <img src="" id="zoomImg" class="zoom-img" onclick="event.stopPropagation()"/>
  </div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <div class="loading-hearts">🍿 🎬 🍿</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
    <div class="loading-text" id="loading-text">Đang lấy link...</div>
  </div>
</div>
<script>
const API_URL = 'https://nftoken.site/v1/api.php';
const API_KEY = 'NFK_51d19f9116b5b7b08b17d5dd';

async function callApi(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
    body: JSON.stringify(payload),
  });
  const text = await r.text();
  try { return JSON.parse(text.replace(/^\uFEFF/, '').trim()); }
  catch { throw new Error('Response không phải JSON: ' + text.substring(0, 120)); }
}

async function getLink() {
  const cookie  = document.getElementById('gl-cookie').value.trim();
  const btn     = document.getElementById('gl-btn');
  const resEl   = document.getElementById('gl-result');
  const overlay = document.getElementById('loading-overlay');
  const loadTxt = document.getElementById('loading-text');
  if (!cookie) { showError(resEl, 'Vui lòng nhập cookie trước!'); return; }
  btn.disabled = true;
  resEl.innerHTML = '';
  overlay.classList.add('show');
  const msgs = ['Đang kết nối Netflix... 🎬','Đang kiểm tra cookie... 🍿','Sắp xong rồi, chờ Hương xíu... 💕','Đang lấy link đăng nhập... ✨'];
  let mi = 0;
  loadTxt.textContent = msgs[0];
  const msgTimer = setInterval(() => { mi = (mi+1)%msgs.length; loadTxt.textContent = msgs[mi]; }, 1200);
  try {
    const data = await callApi({ cookie });
    if (data && (data.status === 'SUCCESS' || data.status === 'success')) {
      renderSuccess(resEl, findNftokenLink(data), data);
    } else {
      showError(resEl, data.message || 'Cookie DIE / không hợp lệ');
    }
  } catch (e) {
    showError(resEl, e.message);
  } finally {
    clearInterval(msgTimer);
    overlay.classList.remove('show');
    btn.disabled = false;
  }
}

function findNftokenLink(data) {
  if (data.nftoken) return `https://netflix.com/?nftoken=${data.nftoken}`;
  if (data.token)   return `https://netflix.com/?nftoken=${data.token}`;
  for (const v of Object.values(data)) {
    if (typeof v === 'string') {
      const m = v.match(/https?:\/\/netflix\.com\/\?nftoken=[^\s"]+/);
      if (m) return m[0];
    }
  }
  return null;
}

function renderSuccess(el, link, data) {
  const meta = [data.email||data.mail, data.plan, data.country].filter(Boolean).join(' · ');
  el.className = 'result-wrap';
  el.innerHTML = `
    <div class="r-success">
      <div class="status-row"><span class="dot dot-g"></span><span style="color:#166534">LIVE — Cookie hợp lệ!</span></div>
      ${meta ? `<p style="font-size:.7rem;color:#6b7280;margin-bottom:8px;font-family:'Baloo 2',sans-serif">${meta}</p>` : ''}
      ${link ? `
        <div class="link-row">
          <span class="link-val" title="${link}">${link}</span>
          <button class="cp-btn" id="cpbtn" onclick="doCopy('${link.replace(/'/g,"\\'")}','cpbtn')">Copy</button>
        </div>
        <a href="${link}" target="_blank" class="open-link">Mở Link Đăng Nhập Netflix</a>
      ` : `<p style="font-size:.73rem;color:#b45309;font-family:'Baloo 2',sans-serif">Không tìm thấy nftoken link.</p>`}
    </div>`;
}

function showError(el, msg) {
  el.className = 'result-wrap';
  el.innerHTML = `<div class="r-error"><div class="status-row"><span class="dot dot-r"></span><span style="color:#be185d;font-size:.8rem;font-family:'Baloo 2',sans-serif">${msg}</span></div></div>`;
}

async function doCopy(text, id) {
  const btn = document.getElementById(id);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
  } catch { prompt('Copy:', text); }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') getLink();
  if (e.key === 'Escape') closeZoom();
  if (e.key === 'ArrowLeft') prevSlide();
  if (e.key === 'ArrowRight') nextSlide();
});

// ── SLIDER ──
let currentSlide = 0;
const totalSlides = 3;
function goSlide(idx) {
  currentSlide = idx;
  document.getElementById('sliderTrack').style.transform = `translateX(-${idx * 100}%)`;
  document.querySelectorAll('.dot-nav').forEach((d, i) => d.classList.toggle('active', i === idx));
}
function nextSlide() { goSlide((currentSlide + 1) % totalSlides); }
function prevSlide() { goSlide((currentSlide - 1 + totalSlides) % totalSlides); }

// swipe support
(function() {
  let startX = 0;
  const wrapper = document.querySelector('.slider-wrapper');
  if (!wrapper) return;
  wrapper.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
  wrapper.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) dx < 0 ? nextSlide() : prevSlide();
  }, {passive:true});
})();

// ── ZOOM ──
function openZoom(src) {
  document.getElementById('zoomImg').src = src;
  document.getElementById('zoomModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeZoom() {
  document.getElementById('zoomModal').classList.remove('show');
  document.body.style.overflow = '';
}

// ── Remove white background from hamster.png via Canvas ──
(function removeHamsterBg() {
  const canvas = document.getElementById('hamster-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = 'assets/hamster.png';
  img.onload = function() {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imageData.data;
    const threshold = 230; // pixels gần trắng sẽ bị transparent
    const tolerance = 30;  // fuzz edge mềm
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      // pixel gần trắng hoặc gần màu nền hồng pastel
      const isWhiteish = r > threshold && g > threshold && b > threshold;
      const isPinkBg   = r > 220 && g > 180 && b > 185 && r > g && r > b;
      if (isWhiteish || isPinkBg) {
        // mức độ transparent tăng dần theo độ gần trắng (anti-alias mềm)
        const brightness = (r + g + b) / 3;
        const alpha = Math.max(0, 255 - brightness) * (255 / (255 - threshold));
        d[i+3] = Math.min(d[i+3], Math.round(alpha));
      }
    }
    ctx.putImageData(imageData, 0, 0);
  };
})();
</script>
</div><!-- /.page -->
</body>
</html>
