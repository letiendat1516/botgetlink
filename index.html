<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hương thích xem phim</title>
  <meta name="description" content="Get link đăng nhập Netflix – Hương thích xem phim"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}

    body{
      font-family:'Fredoka',system-ui,sans-serif;
      background-color:#f9e8ea;
      color:#2a1a1a;
      overflow-x:hidden;
      min-height:100vh;
      position:relative;
    }

    body::before{
      content:'';
      position:fixed;inset:0;z-index:0;
      background-image:repeating-conic-gradient(rgba(245,180,190,.35) 0% 25%, transparent 0% 50%);
      background-size:56px 56px;
      pointer-events:none;
    }

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#e91e8c;border-radius:3px}

    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:28px 18px 60px;min-height:100vh}

    .header{text-align:center;margin-bottom:22px;position:relative}
    .logo-netflix{font-family:'Pacifico',cursive;font-size:clamp(2.4rem,10vw,3.2rem);color:#e91e8c;text-shadow:3px 3px 0 #b00060,5px 5px 0 rgba(185,0,80,.25);line-height:1.1;margin-bottom:4px}
    .logo-sub{font-family:'Pacifico',cursive;font-size:clamp(1.3rem,6vw,1.9rem);color:#e91e8c;text-shadow:2px 2px 0 #b00060,3px 3px 0 rgba(185,0,80,.2);line-height:1.2}
    .popcorn-top{position:absolute;top:-6px;right:8px;font-size:2.6rem;filter:drop-shadow(1px 2px 4px rgba(0,0,0,.18));animation:wobble 3s ease-in-out infinite}
    .butterfly{position:absolute;top:10px;left:4px;font-size:2rem;animation:flutter 2.5s ease-in-out infinite alternate}
    @keyframes wobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
    @keyframes flutter{from{transform:rotate(-10deg) scale(1)}to{transform:rotate(10deg) scale(1.1)}}

    .cookie-card{background:rgba(255,255,255,.55);border:2.5px solid #e91e8c;border-radius:22px;padding:16px;margin-bottom:16px;position:relative;box-shadow:0 4px 20px rgba(233,30,140,.12)}
    .sparkle-tl{position:absolute;top:-10px;right:-10px;font-size:1.5rem;color:#e91e8c;animation:sparkSpin 2s linear infinite}
    @keyframes sparkSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

    .cookie-area{width:100%;min-height:160px;background:transparent;border:none;outline:none;font-family:'Baloo 2',sans-serif;font-size:.88rem;font-weight:600;color:#5a1a2a;resize:none;line-height:1.6}
    .cookie-area::placeholder{color:#c890a0;font-weight:600;font-family:'Baloo 2',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:.85rem}

    .btn-main{width:100%;max-width:320px;margin:0 auto 24px;padding:16px 28px;background:#e91e8c;color:#fff;font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:60px;cursor:pointer;box-shadow:0 6px 22px rgba(233,30,140,.4);transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(233,30,140,.5)}
    .btn-main:active{transform:scale(.97)}
    .btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none !important}

    .result-wrap{margin-bottom:18px;animation:fadeUp .35s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .r-success{background:rgba(255,255,255,.7);border:2px solid #4ade80;border-radius:18px;padding:16px}
    .r-error{background:rgba(255,255,255,.7);border:2px solid #e91e8c;border-radius:18px;padding:16px}
    .status-row{display:flex;align-items:center;gap:7px;font-weight:700;margin-bottom:10px;font-size:.85rem}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot-g{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);animation:dotPulse 1.8s ease-in-out infinite}
    .dot-r{background:#e91e8c;box-shadow:0 0 8px rgba(233,30,140,.5)}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}

    .link-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.8);border:1.5px solid #4ade80;border-radius:12px;padding:9px 12px;margin-bottom:10px}
    .link-val{font-family:'Courier New',monospace;font-size:.68rem;color:#166534;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp-btn{flex-shrink:0;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;background:#dcfce7;color:#166534;font-family:'Fredoka',sans-serif;font-size:.75rem;font-weight:600;transition:background .2s}
    .cp-btn:hover{background:#bbf7d0}
    .cp-btn.ok{background:#86efac}

    .open-link{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border-radius:12px;border:1.5px solid #4ade80;background:rgba(220,252,231,.7);color:#166534;font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:700;text-decoration:none;transition:all .2s}
    .open-link:hover{background:rgba(187,247,208,.9);transform:translateY(-1px)}

    .bottom-section{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.45);border:2px solid #e91e8c;border-radius:20px;padding:16px 18px;margin-bottom:18px;position:relative}
    .stat-block{text-align:center;min-width:80px}
    .stat-247{font-family:'Pacifico',cursive;font-size:2.4rem;color:#e91e8c;text-shadow:2px 2px 0 #b00060;line-height:1;margin-bottom:4px}
    .stat-desc{font-family:'Baloo 2',sans-serif;font-size:.72rem;font-weight:700;color:#b00060;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
    .divider-v{width:2px;height:60px;background:#f5b4be;border-radius:2px;flex-shrink:0}
    .mascot-area{display:flex;align-items:flex-end;gap:10px;flex:1;justify-content:flex-end}
    .sticker{font-size:2rem;filter:drop-shadow(1px 2px 4px rgba(0,0,0,.15))}
    .hamster{font-size:3.2rem;filter:drop-shadow(2px 3px 6px rgba(0,0,0,.15));animation:hamBounce 2s ease-in-out infinite alternate}
    @keyframes hamBounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}

    .footer-banner{background:rgba(255,255,255,.55);border:2.5px solid #e91e8c;border-radius:50px;padding:14px 24px;text-align:center;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px}
    .footer-text{font-family:'Baloo 2',sans-serif;font-size:.85rem;font-weight:800;color:#2a1a1a;text-transform:uppercase;letter-spacing:.04em}
    .footer-icon{font-size:1.4rem}

    .spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(min-width:500px){.page{padding:36px 28px 70px}}
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="butterfly">🦋</div>
    <div class="logo-netflix">Netflix</div>
    <div class="logo-sub">Hương thích xem phim</div>
    <div class="popcorn-top">🍿</div>
  </div>

  <div class="cookie-card">
    <div class="sparkle-tl">✦</div>
    <textarea class="cookie-area" id="gl-cookie" rows="7" placeholder="NHẬP LINK COOKIE....."></textarea>
  </div>

  <button class="btn-main" id="gl-btn" onclick="getLink()">
    LẤY LINK ĐĂNG NHẬP
  </button>

  <div id="gl-result"></div>

  <div class="bottom-section">
    <div class="stat-block">
      <div class="stat-247">24/7</div>
      <div class="stat-desc">UY TÍN - CHẤT LƯỢNG<br>AN TOÀN</div>
    </div>
    <div class="divider-v"></div>
    <div class="mascot-area">
      <div class="sticker">🍿</div>
      <div class="hamster">🐹</div>
      <div class="sticker">🎬</div>
    </div>
    <div style="position:absolute;top:-14px;right:18px;font-size:1.6rem">✨</div>
  </div>

  <div class="footer-banner">
    <div class="footer-icon">🌿</div>
    <div class="footer-text">SHOP THÂN THIỆN VÀ IU THIÊN NHIÊN</div>
    <div class="footer-icon">🌿</div>
  </div>

</div>

<script>
const API_URL = 'https://nftoken.site/v1/api.php';
const API_KEY = 'NFK_51d19f9116b5b7b08b17d5dd';

async function callApi(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
    body: JSON.stringify(payload),
  });
  const text = await r.text();
  try { return JSON.parse(text.replace(/^\uFEFF/, '').trim()); }
  catch { throw new Error('Response không phải JSON: ' + text.substring(0, 120)); }
}

async function getLink() {
  const cookie = document.getElementById('gl-cookie').value.trim();
  const btn    = document.getElementById('gl-btn');
  const resEl  = document.getElementById('gl-result');
  if (!cookie) { showError(resEl, '⚠️ Vui lòng nhập cookie trước!'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Đang xử lý...';
  resEl.innerHTML = '';
  try {
    const data = await callApi({ cookie });
    if (data && (data.status === 'SUCCESS' || data.status === 'success')) {
      const link = findNftokenLink(data);
      renderSuccess(resEl, link, data);
    } else {
      showError(resEl, '❌ ' + (data.message || 'Cookie DIE / không hợp lệ'));
    }
  } catch (e) {
    showError(resEl, '🚫 ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'LẤY LINK ĐĂNG NHẬP';
  }
}

function findNftokenLink(data) {
  if (data.nftoken) return `https://netflix.com/?nftoken=${data.nftoken}`;
  if (data.token)   return `https://netflix.com/?nftoken=${data.token}`;
  for (const v of Object.values(data)) {
    if (typeof v === 'string') {
      const m = v.match(/https?:\/\/netflix\.com\/\?nftoken=[^\s"]+/);
      if (m) return m[0];
    }
  }
  return null;
}

function renderSuccess(el, link, data) {
  const meta = [data.email||data.mail, data.plan, data.country].filter(Boolean).join(' · ');
  el.className = 'result-wrap';
  el.innerHTML = `
    <div class="r-success">
      <div class="status-row"><span class="dot dot-g"></span><span style="color:#166534">LIVE — Cookie hợp lệ! 🎉</span></div>
      ${meta ? `<p style="font-size:.73rem;color:#6b7280;margin-bottom:12px">${meta}</p>` : ''}
      ${link ? `
        <div class="link-row">
          <span class="link-val" title="${link}">${link}</span>
          <button class="cp-btn" id="cpbtn" onclick="doCopy('${link.replace(/'/g,"\\'")}','cpbtn')">Copy</button>
        </div>
        <a href="${link}" target="_blank" class="open-link">🎬 Mở Link Đăng Nhập Netflix</a>
      ` : `<p style="font-size:.76rem;color:#b45309">⚠️ Không tìm thấy nftoken link trong response.</p>`}
    </div>`;
}

function showError(el, msg) {
  el.className = 'result-wrap';
  el.innerHTML = `<div class="r-error"><div class="status-row"><span class="dot dot-r"></span><span style="color:#be185d;font-size:.82rem;font-weight:700">${msg}</span></div></div>`;
}

async function doCopy(text, id) {
  const btn = document.getElementById(id);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
  } catch { prompt('Copy:', text); }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') getLink();
});
</script>
</body>
</html>
