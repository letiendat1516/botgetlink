<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hương thích xem phim</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;overflow-x:hidden}

    body{
      background-image:url('assets/bg.png');
      background-size:cover;
      background-position:center top;
      background-repeat:repeat-y;
      background-color:#fce8ed;
    }

    /* ── PAGE WRAPPER ── */
    .page{
      position:relative;
      max-width:430px;
      margin:0 auto;
      padding:0 0 60px;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── LOGO ── */
    .logo-wrap{
      width:88%;
      margin:0 auto;
      padding-top:32px;
      display:block;
    }
    .logo-wrap img{
      width:100%;
      height:auto;
      display:block;
    }

    /* ── INPUT BOX SECTION ── */
    .inputbox-wrap{
      position:relative;
      width:92%;
      margin:18px auto 0;
    }
    .inputbox-wrap img.inputbox-asset{
      width:100%;
      height:auto;
      display:block;
    }

    /* Textarea overlay: nằm trong vùng trắng của input-box.png
       Vùng trắng ≈ top 10% → bottom 72%, left 6% → right 6%
       Điều chỉnh % nếu cần sau khi xem thực tế */
    .cookie-area{
      position:absolute;
      top:10%;
      left:6%;
      width:88%;
      height:58%;
      background:transparent;
      border:none;
      outline:none;
      resize:none;
      font-family:'Baloo 2','Arial Black',sans-serif;
      font-size:clamp(.75rem,3.2vw,.9rem);
      font-weight:700;
      color:#1a1a1a;
      line-height:1.6;
      z-index:10;
      padding:4px 2px;
    }
    .cookie-area::placeholder{
      color:#333;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.03em;
    }

    /* Button overlay: nằm đè lên nút hồng bên dưới textarea
       Vùng nút ≈ top 74% → bottom 88%, căn giữa */
    .btn-overlay{
      position:absolute;
      bottom:8%;
      left:50%;
      transform:translateX(-50%);
      width:62%;
      height:13%;
      background:transparent;
      border:none;
      cursor:pointer;
      z-index:20;
      border-radius:60px;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-overlay:disabled{cursor:not-allowed;opacity:.4}

    /* ── RESULT (hiện dưới input box) ── */
    #gl-result{
      width:92%;
      margin:12px auto 0;
    }
    .result-wrap{animation:fadeUp .3s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .r-success{background:rgba(255,255,255,.82);border:2px solid #4ade80;border-radius:18px;padding:14px}
    .r-error  {background:rgba(255,255,255,.82);border:2px solid #e91e8c;border-radius:18px;padding:14px}

    .status-row{display:flex;align-items:center;gap:7px;font-weight:700;margin-bottom:8px;font-size:.82rem;font-family:'Baloo 2',sans-serif}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot-g{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);animation:dotPulse 1.8s ease-in-out infinite}
    .dot-r{background:#e91e8c;box-shadow:0 0 8px rgba(233,30,140,.5)}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}

    .link-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.9);border:1.5px solid #4ade80;border-radius:12px;padding:8px 10px;margin-bottom:10px}
    .link-val{font-family:'Courier New',monospace;font-size:.63rem;color:#166534;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp-btn{flex-shrink:0;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;background:#dcfce7;color:#166534;font-family:sans-serif;font-size:.72rem;font-weight:700;transition:background .2s}
    .cp-btn:hover{background:#bbf7d0}
    .cp-btn.ok{background:#86efac}
    .open-link{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border-radius:12px;border:1.5px solid #4ade80;background:rgba(220,252,231,.8);color:#166534;font-family:'Baloo 2',sans-serif;font-size:.85rem;font-weight:700;text-decoration:none;transition:all .2s}
    .open-link:hover{background:rgba(187,247,208,.95);transform:translateY(-1px)}

    /* ── INFO SECTION ── */
    .info-wrap{
      width:70%;
      margin:20px 0 0 4%;
      display:block;
    }
    .info-wrap img{
      width:100%;
      height:auto;
      display:block;
    }

    /* ── HAMSTER SECTION ── */
    .hamster-wrap{
      width:58%;
      margin-top:-60px;
      margin-left:auto;
      margin-right:2%;
      display:block;
      animation:hamFloat 2.5s ease-in-out infinite alternate;
    }
    .hamster-wrap img{
      width:100%;
      height:auto;
      display:block;
    }
    @keyframes hamFloat{from{transform:translateY(0)}to{transform:translateY(-8px)}}

    /* ── FOOTER BANNER ── */
    .footer-banner{
      width:92%;
      margin:18px auto 0;
      background:rgba(255,255,255,.6);
      border:2.5px solid #e91e8c;
      border-radius:50px;
      padding:13px 20px;
      text-align:center;
      font-family:'Baloo 2','Arial Black',sans-serif;
      font-size:clamp(.72rem,3vw,.85rem);
      font-weight:800;
      color:#1a1a1a;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    /* spinner inline */
    .spinner{width:14px;height:14px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── RESPONSIVE ── */
    @media(min-width:431px){
      .page{border-left:1px solid #f5c6d0;border-right:1px solid #f5c6d0}
    }
  </style>
</head>
<body>
<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="assets/logo.png" alt="Netflix – Hương thích xem phim"/>
  </div>

  <!-- INPUT BOX (asset + overlay textarea + invisible button) -->
  <div class="inputbox-wrap">
    <img class="inputbox-asset" src="assets/input-box.png" alt="input box"/>
    <textarea
      class="cookie-area"
      id="gl-cookie"
      placeholder="NHẬP LINK COOKIE....."
    ></textarea>
    <button
      class="btn-overlay"
      id="gl-btn"
      onclick="getLink()"
      aria-label="Lấy link đăng nhập"
    ></button>
  </div>

  <!-- RESULT -->
  <div id="gl-result"></div>

  <!-- INFO 24/7 + HAMSTER -->
  <div class="info-wrap">
    <img src="assets/info.png" alt="24/7 uy tín chất lượng an toàn"/>
  </div>
  <div class="hamster-wrap">
    <img src="assets/hamster.png" alt="hamster popcorn"/>
  </div>

  <!-- FOOTER -->
  <div class="footer-banner">SHOP THÂN THIỆN VÀ IU THIÊN NHIÊN</div>

</div>

<script>
const API_URL = 'https://nftoken.site/v1/api.php';
const API_KEY = 'NFK_51d19f9116b5b7b08b17d5dd';

async function callApi(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
    body: JSON.stringify(payload),
  });
  const text = await r.text();
  try { return JSON.parse(text.replace(/^\uFEFF/, '').trim()); }
  catch { throw new Error('Response không phải JSON: ' + text.substring(0, 120)); }
}

async function getLink() {
  const cookie = document.getElementById('gl-cookie').value.trim();
  const btn    = document.getElementById('gl-btn');
  const resEl  = document.getElementById('gl-result');
  if (!cookie) { showError(resEl, 'Vui lòng nhập cookie trước!'); return; }
  btn.disabled = true;
  resEl.innerHTML = '';
  try {
    const data = await callApi({ cookie });
    if (data && (data.status === 'SUCCESS' || data.status === 'success')) {
      renderSuccess(resEl, findNftokenLink(data), data);
    } else {
      showError(resEl, data.message || 'Cookie DIE / không hợp lệ');
    }
  } catch (e) {
    showError(resEl, e.message);
  } finally {
    btn.disabled = false;
  }
}

function findNftokenLink(data) {
  if (data.nftoken) return `https://netflix.com/?nftoken=${data.nftoken}`;
  if (data.token)   return `https://netflix.com/?nftoken=${data.token}`;
  for (const v of Object.values(data)) {
    if (typeof v === 'string') {
      const m = v.match(/https?:\/\/netflix\.com\/\?nftoken=[^\s"]+/);
      if (m) return m[0];
    }
  }
  return null;
}

function renderSuccess(el, link, data) {
  const meta = [data.email||data.mail, data.plan, data.country].filter(Boolean).join(' · ');
  el.className = 'result-wrap';
  el.innerHTML = `
    <div class="r-success">
      <div class="status-row"><span class="dot dot-g"></span><span style="color:#166534">LIVE — Cookie hợp lệ!</span></div>
      ${meta ? `<p style="font-size:.71rem;color:#6b7280;margin-bottom:9px;font-family:'Baloo 2',sans-serif">${meta}</p>` : ''}
      ${link ? `
        <div class="link-row">
          <span class="link-val" title="${link}">${link}</span>
          <button class="cp-btn" id="cpbtn" onclick="doCopy('${link.replace(/'/g,"\\'")}','cpbtn')">Copy</button>
        </div>
        <a href="${link}" target="_blank" class="open-link">Mo Link Dang Nhap Netflix</a>
      ` : `<p style="font-size:.74rem;color:#b45309;font-family:'Baloo 2',sans-serif">Khong tim thay nftoken link.</p>`}
    </div>`;
}

function showError(el, msg) {
  el.className = 'result-wrap';
  el.innerHTML = `<div class="r-error"><div class="status-row"><span class="dot dot-r"></span><span style="color:#be185d;font-size:.82rem">${msg}</span></div></div>`;
}

async function doCopy(text, id) {
  const btn = document.getElementById(id);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
  } catch { prompt('Copy:', text); }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') getLink();
});
</script>
</body>
</html>
